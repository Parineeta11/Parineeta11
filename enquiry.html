<!DOCTYPE html>
<html>
<head>
<title>Tourist Enquiry</title>
<link rel="stylesheet" href="style.css">
<script src="enquiry.js"></script>
</head>

<body>

<h1>Tourist Enquiry Form</h1>

<form onsubmit="return validateForm()">

<label>Name:</label>
<input type="text" id="name"><br><br>

<label>Email:</label>
<input type="email" id="email"><br><br>

<label>Country:</label>
<input type="text" id="country"><br><br>

<label>Message:</label>
<textarea id="message"></textarea><br><br>

<button type="submit">Submit</button>

</form>

</body>
</html>
